app = 'example'

# https://fly.io/docs/reference/regions/
primary_region = 'nrt'

[build]
image = 'foo/bar:latest'

[env]
TZ = 'Asia/Tokyo'

[[files]]
# fly secrets set CONFIG_B64="$(base64 < config.yaml | tr -d '\n')"
guest_path = '/etc/example/config.yaml'
secret_name = 'CONFIG_B64'

[[mounts]]
source = 'example'
destination = '/var/lib/example'
initial_size = '1gb'

[http_service]
internal_port = 3000
force_https = true
processes = ['app']

auto_stop_machines = "suspend"
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
interval = "15s"
timeout = "5s"
grace_period = "20s"
method = "GET"
path = "/health"

[[metrics]]
port = 9090
path = "/metrics"
processes = ["app"]

[[vm]]
memory = '512mb'
cpu_kind = 'shared'
cpus = 1
memory_mb = 512
